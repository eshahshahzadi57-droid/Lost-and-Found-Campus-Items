<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusFinder | Report Item</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight"><a href="index.html">CampusFinder</a></h1>
            <div class="flex items-center gap-4">
                <span id="navName" class="text-blue-100 text-sm font-medium"></span>
                <a href="index.html" class="text-sm font-medium hover:text-blue-100">← Back to Feed</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-4">
        <div class="max-w-xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden">

            <div class="bg-gradient-to-r from-blue-600 to-blue-700 p-8 text-white text-center">
                <h2 class="text-3xl font-bold">New Report</h2>
                <p class="opacity-80 mt-1">Fill in the details to post on the board</p>
            </div>

            <div id="notLoggedIn" class="hidden p-8 text-center">
                <div class="text-5xl mb-4">🔒</div>
                <p class="text-gray-600 font-medium mb-4">You need to be logged in to post a report.</p>
                <a href="login.html" class="inline-block bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-blue-700 transition">
                    Login or Sign Up
                </a>
            </div>

            <form id="reportForm" class="hidden p-8 space-y-6">

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-3 uppercase tracking-wide">Status</label>
                    <div class="flex gap-4">
                        <label class="flex-1 text-center border-2 p-4 rounded-2xl cursor-pointer transition-all has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                            <input type="radio" name="itemStatus" value="lost" class="hidden" checked>
                            <span class="block font-bold text-gray-600">I Lost It</span>
                        </label>
                        <label class="flex-1 text-center border-2 p-4 rounded-2xl cursor-pointer transition-all has-[:checked]:border-green-500 has-[:checked]:bg-green-50">
                            <input type="radio" name="itemStatus" value="found" class="hidden">
                            <span class="block font-bold text-gray-600">I Found It</span>
                        </label>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Item Title</label>
                        <input type="text" name="itemName" required placeholder="e.g. Blue Backpack"
                            class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Category</label>
                        <select name="itemCategory"
                            class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="electronics">Electronics</option>
                            <option value="stationery">Books & Stationery</option>
                            <option value="keys">Keys & ID Cards</option>
                            <option value="personal">Wallets & Personal Items</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Campus Location</label>
                        <input type="text" name="itemLocation" required placeholder="e.g. CS Department, 1st Floor"
                            class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Additional Details</label>
                        <textarea name="itemDescription" rows="3"
                            placeholder="Any specific details (marks, scratches, contents)..."
                            class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>
                </div>

                <div class="bg-blue-50 border-2 border-dashed border-blue-200 p-6 rounded-2xl text-center">
                    <input type="file" name="itemImage" id="imgInp" class="hidden" accept="image/*" onchange="previewImage(event)">
                    <label for="imgInp" class="cursor-pointer group">
                        <div id="uploadPrompt">
                            <div class="text-blue-600 font-bold group-hover:underline">Click to add a photo</div>
                            <p class="text-xs text-gray-400 mt-1 italic">Adding a photo helps identification by 90%</p>
                        </div>
                        <img id="imagePreview" class="hidden mt-3 mx-auto max-h-40 rounded-xl object-cover shadow" alt="preview">
                        <p id="changePhotoHint" class="hidden text-xs text-blue-500 mt-2 italic">Click to change photo</p>
                    </label>
                </div>

                <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm"></div>
                <div id="successMsg" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl text-sm font-bold text-center"></div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-700 shadow-xl transition transform active:scale-95 flex items-center justify-center gap-2">
                    <span id="btnText">POST REPORT</span>
                    <span id="btnSpinner" class="hidden animate-spin">⏳</span>
                </button>
            </form>
        </div>
    </main>

    <script>
        const API   = 'http://localhost:5000';
        const token = localStorage.getItem('cf_token');
        const user  = JSON.parse(localStorage.getItem('cf_user') || 'null');

        if (token && user) {
            document.getElementById('reportForm').classList.remove('hidden');
            document.getElementById('navName').textContent = `👋 ${user.name}`;
        } else {
            document.getElementById('notLoggedIn').classList.remove('hidden');
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').classList.remove('hidden');
                document.getElementById('uploadPrompt').classList.add('hidden');
                document.getElementById('changePhotoHint').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl   = document.getElementById('errorMsg');
            const successEl = document.getElementById('successMsg');
            const btnText   = document.getElementById('btnText');
            const spinner   = document.getElementById('btnSpinner');
            const submitBtn = document.getElementById('submitBtn');

            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');
            btnText.textContent = 'Posting...';
            spinner.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                const formData = new FormData(e.target);
                const res = await fetch(`${API}/api/items`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const json = await res.json();
                if (!json.success) throw new Error(json.message);

                successEl.textContent = '✅ Report posted successfully! Redirecting...';
                successEl.classList.remove('hidden');
                e.target.reset();
                document.getElementById('imagePreview').classList.add('hidden');
                document.getElementById('uploadPrompt').classList.remove('hidden');
                document.getElementById('changePhotoHint').classList.add('hidden');
                setTimeout(() => window.location.href = 'index.html', 1800);

            } catch (err) {
                errorEl.textContent = '❌ ' + err.message;
                errorEl.classList.remove('hidden');
            } finally {
                btnText.textContent = 'POST REPORT';
                spinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
