<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusFinder | My Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold"><a href="index.html">CampusFinder</a></h1>
            <div class="flex items-center gap-4">
                <span id="navName" class="text-blue-100 text-sm font-medium"></span>
                <a href="index.html" class="hover:text-blue-200 text-sm">Home</a>
                <button onclick="logout()" class="bg-white text-blue-600 px-4 py-2 rounded-lg font-semibold hover:bg-blue-50 text-sm transition">
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-4">

        <div class="mb-8">
            <h2 class="text-3xl font-extrabold text-gray-800">My Dashboard</h2>
            <p class="text-gray-500 mt-1">All reports you have posted</p>
        </div>

        <div class="grid grid-cols-4 gap-4 mb-10">
            <div class="bg-white rounded-2xl p-5 shadow-sm border text-center">
                <div id="statTotal" class="text-3xl font-black text-blue-600">-</div>
                <div class="text-xs text-gray-400 mt-1 uppercase font-bold">Total Posts</div>
            </div>
            <div class="bg-white rounded-2xl p-5 shadow-sm border text-center">
                <div id="statLost" class="text-3xl font-black text-red-500">-</div>
                <div class="text-xs text-gray-400 mt-1 uppercase font-bold">Lost</div>
            </div>
            <div class="bg-white rounded-2xl p-5 shadow-sm border text-center">
                <div id="statFound" class="text-3xl font-black text-green-500">-</div>
                <div class="text-xs text-gray-400 mt-1 uppercase font-bold">Found</div>
            </div>
            <div class="bg-white rounded-2xl p-5 shadow-sm border text-center">
                <div id="statResolved" class="text-3xl font-black text-purple-500">-</div>
                <div class="text-xs text-gray-400 mt-1 uppercase font-bold">Resolved</div>
            </div>
        </div>

        <div id="loadingSpinner" class="text-center py-16 text-gray-400">
            <div class="text-5xl mb-4 animate-pulse">📋</div>
            <p class="font-medium">Loading your posts...</p>
        </div>

        <div id="emptyState" class="hidden text-center py-16 text-gray-400">
            <div class="text-5xl mb-4">📭</div>
            <p class="font-medium">You haven't posted anything yet.</p>
            <a href="reportForm.html" class="mt-4 inline-block text-blue-600 font-bold hover:underline">Post your first report</a>
        </div>

        <div id="itemsList" class="space-y-4"></div>
    </main>

    <!-- Resolve Modal -->
    <div id="resolveModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full overflow-hidden">
            <div class="bg-gradient-to-r from-purple-500 to-purple-600 p-6 text-white text-center rounded-t-3xl">
                <div class="text-5xl mb-2">🎉</div>
                <h3 class="text-2xl font-bold">Item Returned!</h3>
            </div>
            <div class="p-6 text-center space-y-4">
                <p class="text-gray-600">Mark <span id="resolveItemName" class="font-bold text-gray-800"></span> as resolved?</p>
                <p class="text-sm text-gray-400 italic">This will permanently delete the post from the feed.</p>
                <div class="flex gap-3 mt-4">
                    <button onclick="closeResolveModal()"
                        class="flex-1 py-3 rounded-2xl border-2 border-gray-200 font-bold text-gray-600 hover:bg-gray-50 transition">
                        Cancel
                    </button>
                    <button id="resolveConfirmBtn" onclick="confirmResolve()"
                        class="flex-1 py-3 rounded-2xl bg-purple-600 text-white font-bold hover:bg-purple-700 transition">
                        Yes, Resolved! ✅
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto">
            <div class="bg-gradient-to-r from-blue-600 to-blue-700 p-6 text-white text-center rounded-t-3xl">
                <h3 class="text-2xl font-bold">Edit Report</h3>
            </div>
            <form id="editForm" class="p-6 space-y-4">
                <input type="hidden" id="editItemId">
                <div class="flex gap-4">
                    <label class="flex-1 text-center border-2 p-3 rounded-2xl cursor-pointer transition-all has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                        <input type="radio" name="editStatus" value="lost" class="hidden">
                        <span class="block font-bold text-gray-600 text-sm">Lost</span>
                    </label>
                    <label class="flex-1 text-center border-2 p-3 rounded-2xl cursor-pointer transition-all has-[:checked]:border-green-500 has-[:checked]:bg-green-50">
                        <input type="radio" name="editStatus" value="found" class="hidden">
                        <span class="block font-bold text-gray-600 text-sm">Found</span>
                    </label>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Item Title</label>
                    <input type="text" id="editName" required
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Category</label>
                    <select id="editCategory"
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="electronics">Electronics</option>
                        <option value="stationery">Books & Stationery</option>
                        <option value="keys">Keys & ID Cards</option>
                        <option value="personal">Wallets & Personal Items</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Location</label>
                    <input type="text" id="editLocation" required
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Details</label>
                    <textarea id="editDescription" rows="3"
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>
                <div id="editError" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm"></div>
                <div class="flex gap-3">
                    <button type="button" onclick="closeEditModal()"
                        class="flex-1 py-3 rounded-2xl border-2 border-gray-200 font-bold text-gray-600 hover:bg-gray-50 transition">
                        Cancel
                    </button>
                    <button type="submit"
                        class="flex-1 py-3 rounded-2xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API   = 'http://localhost:5000';
        const token = localStorage.getItem('cf_token');
        const user  = JSON.parse(localStorage.getItem('cf_user') || 'null');

        if (!token || !user) window.location.href = 'login.html';

        document.getElementById('navName').textContent = `👋 ${user.name}`;

        function logout() {
            localStorage.removeItem('cf_token');
            localStorage.removeItem('cf_user');
            window.location.href = 'index.html';
        }

        function formatDate(iso) {
            return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        const CATEGORY_LABELS = {
            electronics: 'Electronics',
            stationery:  'Books & Stationery',
            keys:        'Keys & ID Cards',
            personal:    'Wallets & Personal Items'
        };

        const FALLBACK_IMAGES = {
            electronics: 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=500&q=80',
            stationery:  'https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&w=500&q=80',
            keys:        'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?auto=format&fit=crop&w=500&q=80',
            personal:    'https://images.unsplash.com/photo-1627123424574-724758594e93?auto=format&fit=crop&w=500&q=80'
        };

        function buildRow(item) {
            const imgSrc = item.imagePath ? `${API}/${item.imagePath}` : (FALLBACK_IMAGES[item.itemCategory] || FALLBACK_IMAGES.personal);
            const badgeClass = item.itemStatus === 'found' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
            return `
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex gap-4 items-start hover:shadow-md transition">
                <img src="${imgSrc}" alt="${item.itemName}" class="w-20 h-20 object-cover rounded-xl flex-shrink-0"
                    onerror="this.src='${FALLBACK_IMAGES.personal}'">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 flex-wrap">
                        <h4 class="text-lg font-extrabold text-gray-800">${item.itemName}</h4>
                        <span class="text-xs font-bold uppercase px-2 py-1 rounded-full ${badgeClass}">${item.itemStatus}</span>
                    </div>
                    <p class="text-sm text-gray-500 mt-1">${CATEGORY_LABELS[item.itemCategory] || item.itemCategory} · 📍 ${item.itemLocation}</p>
                    ${item.itemDescription ? `<p class="text-xs text-gray-400 mt-1 italic line-clamp-1">${item.itemDescription}</p>` : ''}
                    <p class="text-xs text-gray-300 mt-1">${formatDate(item.createdAt)}</p>
                </div>
                <div class="flex flex-col gap-2 flex-shrink-0">
                    <button onclick="resolveItem('${item._id}', '${item.itemName}')"
                        class="px-4 py-2 bg-purple-50 text-purple-600 font-bold rounded-xl hover:bg-purple-100 transition text-sm">
                        ✅ Resolved
                    </button>
                    <button onclick='openEditModal(${JSON.stringify(item)})'
                        class="px-4 py-2 bg-blue-50 text-blue-600 font-bold rounded-xl hover:bg-blue-100 transition text-sm">
                        ✏️ Edit
                    </button>
                    <button onclick="deleteItem('${item._id}')"
                        class="px-4 py-2 bg-red-50 text-red-600 font-bold rounded-xl hover:bg-red-100 transition text-sm">
                        🗑️ Delete
                    </button>
                </div>
            </div>`;
        }

        async function loadMyItems() {
            try {
                const res  = await fetch(`${API}/api/items/mine`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const json = await res.json();
                document.getElementById('loadingSpinner').classList.add('hidden');

                if (!json.success || json.data.length === 0) {
                    document.getElementById('emptyState').classList.remove('hidden');
                    document.getElementById('statTotal').textContent    = 0;
                    document.getElementById('statLost').textContent     = 0;
                    document.getElementById('statFound').textContent    = 0;
                    document.getElementById('statResolved').textContent = parseInt(sessionStorage.getItem('cf_resolved') || '0');
                    return;
                }

                const lost     = json.data.filter(i => i.itemStatus === 'lost').length;
                const found    = json.data.filter(i => i.itemStatus === 'found').length;
                const resolved = parseInt(sessionStorage.getItem('cf_resolved') || '0');
                document.getElementById('statTotal').textContent    = json.count;
                document.getElementById('statLost').textContent     = lost;
                document.getElementById('statFound').textContent    = found;
                document.getElementById('statResolved').textContent = resolved;
                document.getElementById('itemsList').innerHTML      = json.data.map(buildRow).join('');

            } catch (err) {
                document.getElementById('loadingSpinner').classList.add('hidden');
                document.getElementById('itemsList').innerHTML = `
                    <div class="text-center py-10 text-red-400">
                        <p>⚠️ Could not connect to server. Make sure server.js is running.</p>
                    </div>`;
            }
        }

        // ── Resolve ──
        let resolveTargetId = null;

        function resolveItem(id, name) {
            resolveTargetId = id;
            document.getElementById('resolveItemName').textContent = name;
            document.getElementById('resolveModal').classList.remove('hidden');
        }

        function closeResolveModal() {
            resolveTargetId = null;
            document.getElementById('resolveModal').classList.add('hidden');
        }

        async function confirmResolve() {
            if (!resolveTargetId) return;
            const btn = document.getElementById('resolveConfirmBtn');
            btn.textContent = 'Deleting...';
            btn.disabled = true;
            try {
                const res  = await fetch(`${API}/api/items/${resolveTargetId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const json = await res.json();
                if (!json.success) throw new Error(json.message);

                const resolved = parseInt(sessionStorage.getItem('cf_resolved') || '0') + 1;
                sessionStorage.setItem('cf_resolved', resolved);

                closeResolveModal();
                loadMyItems();
            } catch (err) {
                alert('❌ ' + err.message);
            } finally {
                btn.textContent = 'Yes, Resolved! ✅';
                btn.disabled = false;
            }
        }

        document.getElementById('resolveModal').addEventListener('click', e => {
            if (e.target === document.getElementById('resolveModal')) closeResolveModal();
        });

        // ── Delete ──
        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this report?')) return;
            try {
                const res  = await fetch(`${API}/api/items/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const json = await res.json();
                if (!json.success) throw new Error(json.message);
                loadMyItems();
            } catch (err) {
                alert('❌ ' + err.message);
            }
        }

        // ── Edit Modal ──
        function openEditModal(item) {
            document.getElementById('editItemId').value       = item._id;
            document.getElementById('editName').value         = item.itemName;
            document.getElementById('editCategory').value     = item.itemCategory;
            document.getElementById('editLocation').value     = item.itemLocation;
            document.getElementById('editDescription').value  = item.itemDescription || '';
            document.querySelectorAll('input[name="editStatus"]').forEach(r => r.checked = r.value === item.itemStatus);
            document.getElementById('editError').classList.add('hidden');
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        document.getElementById('editForm').addEventListener('submit', async e => {
            e.preventDefault();
            const errEl = document.getElementById('editError');
            errEl.classList.add('hidden');
            const id = document.getElementById('editItemId').value;
            const formData = new FormData();
            formData.append('itemName',        document.getElementById('editName').value);
            formData.append('itemStatus',      document.querySelector('input[name="editStatus"]:checked').value);
            formData.append('itemCategory',    document.getElementById('editCategory').value);
            formData.append('itemLocation',    document.getElementById('editLocation').value);
            formData.append('itemDescription', document.getElementById('editDescription').value);
            try {
                const res  = await fetch(`${API}/api/items/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const json = await res.json();
                if (!json.success) throw new Error(json.message);
                closeEditModal();
                loadMyItems();
            } catch (err) {
                errEl.textContent = '❌ ' + err.message;
                errEl.classList.remove('hidden');
            }
        });

        document.getElementById('editModal').addEventListener('click', e => {
            if (e.target === document.getElementById('editModal')) closeEditModal();
        });

        loadMyItems();
    </script>
</body>
</html>
